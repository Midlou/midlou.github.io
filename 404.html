<!DOCTYPE html>
<html lang="en" ng-app="twwipls" ng-controller="twwipls">

<head>
    <!-- Global site tag (gtag.js) - Google Analytics -->

    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-166798367-2"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'UA-166798367-2');
    </script>

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- CSS -->
    <link rel="stylesheet" href="css/custom.css">

    <!-- Bootstrap CSS Darkly Theme-->
    <link rel="stylesheet" ng-href="css/bootstrap/vapor/bootstrap.min.css">

    <title>404 - Not found</title>
</head>

<body style="height: 100vh; margin:0;">
    <div class="se-pre-con">
        <div class="justify-content-center vertical-center">
            <div class="spinner-border text-success" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>

    <nav class="navbar navbar-dark bg-dark p-4">
        <div class="container-lg">
            <h2 class="text-danger">Not found!</h2>
            <span>Why are we still here ...</span>
            <small class="text-muted">... just to suffer</small>
        </div>
    </nav>

    <hr>

    <div class="container-fluid">

        <div class="row">
            <div class="col-12 text-center">
                <h1 class="display-1 text-danger">404!</h1>
                <h1 class="display-5 text-warning">Nothing to see here, go away!</h1>
                <h1 class="display-5">
                    <a class="btn btn-lg btn-success btn-block" href="/">
                        <b>EXIT</b>
                    </a>
                </h1>
            </div>
        </div>

        <!-- Footer -->
        <div class="row">
            <div class="col-md-12">

            </div>
        </div>
    </div>

    <!-- Font awesome icons -->
    <script src="https://kit.fontawesome.com/833adfb60e.js" crossorigin="anonymous"></script>

    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="js/bootstrap/jquery-3.5.1.min.js"></script>
    <script src="js/bootstrap/popper.min.js"></script>
    <script src="js/bootstrap/bootstrap.min.js"></script>

    <!-- AngularJS -->
    <script src="js/angular.min.js"></script>
    <script src="js/init.js"></script>

    <!-- Optional JavaScript -->
    <script src="js/main.js"></script>


</body>

</html>
